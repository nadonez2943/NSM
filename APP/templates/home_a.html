<doctype html>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    {% extends 'layout.html' %}
    {% block body %}
    <div class="container mt-3">
      <div id="child1">
        <a>ค้นหาโครงการ</a>
        <form action = "/showsearchs" method = "POST">
            <input type="text" class="btn btn-outline-dark" placeholder="Search.." name="search">
            <button type="submit" class="btn btn-primary">Search</button>
        </form>
        <div class="jumbotron">
          <div class="container mt-3">
            <h2>โครงการ</h2>
            <div class="table-responsive">
              <table class="table table-bordered">
                <thead>
                  <tr>
                    <th>ลำดับ</th>
                    <th>เลขสารบัญ</th>
                    <th>ชื่อโครงการ</th>
                    <th>ประเภทโครงการ</th>
                    <th>จำนวนงาน</th>
                    <th>งบประมาณประจำปี</th>
                    <th>สถานะ</th>
                  </tr>
                </thead>
                {% for row in row %}
                <tbody>
                  <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td><a href = "/darft/{{ row[0] }}">{{ row[2] }}</a></td>
                    <td>{{  row[3] }}</td>
                    <td>{{  row[4] }}</td>
                    <td>{{  row[5] }}</td>
                    <td>{{  row[6] }}</td>
                    <!-- <td><a href = "/darft/{{ row[5] }}">{{ row[5] }}</a></td> -->
                  </tr>
                  {% endfor %}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      
      </center>
    {% endblock %}
