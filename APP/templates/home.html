<doctype html>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
      {% extends 'layout.html' %}
      {% block body %}
      <div class="container mt-3">
        <div id="child1">
          <div class="jumbotron">
            <div class="container mt-3">
              <h2>ค้นหาโครงการของฉัน</h2>
              <div class="table-responsive">
                <table class="table table-bordered">
                  <thead>
                    <tr>
                      <th>ลำดับ</th>
                      <th>ชื่อโครงการ</th>
                      <th>ประเภทโครงการ</th>
                      <th>งบประมาณประจำปี</th>
                      <th>ตำแหน่ง</th>
                      <th>สถานะ</th>
                    </tr>
                  </thead>
                  {% for row in row %}
                  <tbody>
                    <tr>
                      <td>{{ row[0] }}</td>
                      <td><a href = "/projects/{{ row[0] }}">{{ row[1] }}</a></td>
                      <td>{{ row[2] }}</td>
                      <td>{{  row[3] }}</td>
                      <td>{{  row[4] }}</td>
                      <td>{{  row[5] }}</td>
                    </tr>
                    {% endfor %}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        
        </center>
      {% endblock %}
